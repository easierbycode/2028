<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>2028.ai — Phaser 4</title>
    <!-- PWA manifest & iOS standalone mode -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="2028.ai" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: #000;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-overflow-scrolling: auto;
            -ms-touch-action: none;
            font-family: sans-serif;
            color: #0f0;
        }
        #phaser-canvas {
            width: 100%;
            height: 100%;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }
        #phaser-canvas canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        #iosInstallBanner {
            display: none;
            position: fixed;
            bottom: env(safe-area-inset-bottom, 0px);
            left: 0;
            right: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 12px;
            padding: 10px 12px;
            text-align: center;
            border-top: 1px solid #333;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        /* How-to / level-editor modal overlay */
        #howtoModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
        }
        #howtoModal.visible { display: flex; }
        #howtoModal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Force portrait layout on landscape screens.
           Skipped when Electron has physically rotated the display via
           xrandr (.electron-rotated) to avoid double-rotation. */
        @media screen and (orientation: landscape) {
            html:not(.electron-rotated) {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
            html:not(.electron-rotated) body {
                height: 100%;
            }
            html:not(.electron-rotated) #phaser-canvas {
                height: 100%;
            }
        }
    </style>

    <!-- Firebase config (global, loaded before compat libs) -->
    <script>
        window.firebaseConfig = window.firebaseConfig || {
            apiKey: "AIzaSyAHY_agipyNEXvY2J4jDgnlk9kLeM6O37Y",
            authDomain: "evil-invaders.firebaseapp.com",
            databaseURL: "https://evil-invaders-default-rtdb.firebaseio.com",
            projectId: "evil-invaders",
            storageBucket: "evil-invaders.firebasestorage.app",
            messagingSenderId: "149257705855",
            appId: "1:149257705855:web:3f048481dfc66cef61224a",
        };
        window.__FIREBASE_CONFIG__ = window.__FIREBASE_CONFIG__ || window.firebaseConfig;
        window.__FIREBASE_DATABASE_PATH__ = window.__FIREBASE_DATABASE_PATH__ || "leaderboards/globalHighScore";
    </script>
</head>
<body>
    <div id="baseUrl" hidden>./</div>

    <!-- Game canvas container -->
    <div id="phaser-canvas"></div>

    <!-- iOS "Add to Home Screen" banner -->
    <div id="iosInstallBanner">
        <span style="display:inline-block; max-width:280px; line-height:1.4;">
            For fullscreen: tap
            <span style="font-size:16px; vertical-align:middle;">&#x1F4E4;</span>
            then <strong>"Add to Home Screen"</strong>
        </span>
        <button id="iosInstallDismiss" style="position:absolute; top:4px; right:8px; background:none; border:none; color:#888; font-size:18px; cursor:pointer; padding:4px 8px; line-height:1;">×</button>
    </div>

    <!-- How-to / level-editor modal -->
    <div id="howtoModal">
        <iframe id="howtoIframe"></iframe>
    </div>

    <!-- Phaser 4.0.0-rc.6 (bundled locally for Cordova/offline support) -->
    <script src="./lib/phaser.min.js"></script>
    <!-- Firebase (leaderboard support, bundled locally) -->
    <script src="./lib/firebase-app-compat.js"></script>
    <script src="./lib/firebase-database-compat.js"></script>

    <script>
        // -----------------------------------------------------------------------
        // How-to modal open/close (called from TitleScene howto button)
        // -----------------------------------------------------------------------
        window.howtoModalOpen = function () {
            var modal = document.getElementById("howtoModal");
            var iframe = document.getElementById("howtoIframe");
            if (!modal) return;
            if (iframe) iframe.src = "level-editor.html";
            modal.classList.add("visible");
        };
        window.howtoModalClose = function () {
            var modal = document.getElementById("howtoModal");
            var iframe = document.getElementById("howtoIframe");
            if (modal) modal.classList.remove("visible");
            if (iframe) iframe.src = "about:blank";
        };

        // -----------------------------------------------------------------------
        // Orientation lock
        // -----------------------------------------------------------------------
        function lockPortrait() {
            if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
                window.screen.orientation.lock("portrait").catch(function () {});
            }
        }

        // -----------------------------------------------------------------------
        // Fullscreen helpers
        // -----------------------------------------------------------------------
        function enterFullscreen(element) {
            var el = element || document.documentElement;
            var rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.msRequestFullscreen;
            if (!rfs) return;
            var promise = rfs.call(el, { navigationUI: "hide" });
            if (promise && promise.then) {
                promise.then(lockPortrait).catch(function () {});
            } else {
                lockPortrait();
            }
        }

        function isFullscreen() {
            return !!(document.fullscreenElement
                || document.webkitFullscreenElement
                || document.msFullscreenElement);
        }

        function onFullscreenChange() {
            if (!isFullscreen()) {
                setTimeout(function () {
                    if (!isFullscreen()) {
                        enterFullscreen(
                            document.querySelector("#phaser-canvas canvas")
                            || document.documentElement
                        );
                    }
                }, 300);
            }
        }

        if (document.fullscreenEnabled || document.webkitFullscreenEnabled) {
            document.addEventListener("fullscreenchange", onFullscreenChange, false);
            document.addEventListener("webkitfullscreenchange", onFullscreenChange, false);
        }

        // -----------------------------------------------------------------------
        // Mobile audio unlock — intercept ALL AudioContexts and resume on
        // first gesture.  Monkey-patches the constructor so contexts that
        // Phaser/PIXI.sound create *before* any touch are still captured.
        // Also unlocks HTML5 Audio with a silent data-URI.
        // -----------------------------------------------------------------------
        (function unlockAudioContext() {
            var allContexts = [];
            var unlocked = false;
            var OrigAC = window.AudioContext || window.webkitAudioContext;
            if (!OrigAC) return;

            function PatchedAC() {
                var ctx = new OrigAC();
                allContexts.push(ctx);
                return ctx;
            }
            PatchedAC.prototype = OrigAC.prototype;
            if (window.AudioContext) window.AudioContext = PatchedAC;
            if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;

            function resumeContext(ctx) {
                if (!ctx) return;
                if (ctx.state === "suspended" || ctx.state === "interrupted") {
                    ctx.resume().catch(function () {});
                }
                try {
                    var buf = ctx.createBuffer(1, 1, 22050);
                    var src = ctx.createBufferSource();
                    src.buffer = buf;
                    src.connect(ctx.destination);
                    if (src.start) { src.start(0); } else { src.noteOn(0); }
                } catch (e) {}
            }

            function unlock() {
                if (unlocked) return;
                unlocked = true;

                for (var i = 0; i < allContexts.length; i++) {
                    resumeContext(allContexts[i]);
                }

                // Probe Phaser 4's game instance
                var game = window.__PHASER_4_GAME__;
                if (game && game.sound) {
                    var ctx = game.sound.context || game.sound.audioContext;
                    if (ctx) resumeContext(ctx);
                    if (typeof game.sound.unlock === "function") {
                        try { game.sound.unlock(); } catch (e) {}
                    }
                    if (game.sound.locked) game.sound.locked = false;
                }

                if (allContexts.length === 0) {
                    resumeContext(new OrigAC());
                }

                // Also unlock HTML5 Audio with a silent mp3
                var a = new Audio();
                a.src = "data:audio/mpeg;base64,/+NIxAAAAAANIAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";
                a.play().catch(function(){});

                document.removeEventListener("touchstart", unlock, true);
                document.removeEventListener("touchend", unlock, true);
                document.removeEventListener("click", unlock, true);
                document.removeEventListener("pointerup", unlock, true);
            }

            document.addEventListener("touchstart", unlock, true);
            document.addEventListener("touchend", unlock, true);
            document.addEventListener("click", unlock, true);
            document.addEventListener("pointerup", unlock, true);
        })();

        // -----------------------------------------------------------------------
        // Edge-swipe prevention
        // -----------------------------------------------------------------------
        (function preventEdgeSwipe() {
            var EDGE_PX = 30;
            document.addEventListener("touchstart", function (e) {
                if (!e.touches || e.touches.length === 0) return;
                var x = e.touches[0].clientX;
                var w = window.innerWidth;
                if (x < EDGE_PX || x > w - EDGE_PX) e.preventDefault();
            }, { passive: false, capture: true });
            document.addEventListener("touchmove", function (e) {
                if (!e.touches || e.touches.length === 0) return;
                var x = e.touches[0].clientX;
                var w = window.innerWidth;
                if (x < EDGE_PX || x > w - EDGE_PX) e.preventDefault();
            }, { passive: false, capture: true });
        })();

        // -----------------------------------------------------------------------
        // Canvas FIT scaling — scales 256x480 to fill viewport
        // -----------------------------------------------------------------------
        function fitCanvas() {
            var pc = document.querySelector("#phaser-canvas canvas");
            if (!pc) return;
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            // When the CSS rotation hack is active (mobile web landscape
            // fallback), the visual viewport is portrait but innerWidth/
            // innerHeight still report landscape — swap them.
            // Skip the swap inside Electron or when no CSS transform exists.
            var htmlTransform = window.getComputedStyle(document.documentElement).transform;
            var cssRotated = htmlTransform && htmlTransform !== "none";
            if (cssRotated && vw > vh) { var tmp = vw; vw = vh; vh = tmp; }
            var scale = Math.min(vw / 256, vh / 480);
            pc.style.width = Math.floor(256 * scale) + "px";
            pc.style.height = Math.floor(480 * scale) + "px";
        }
        window.addEventListener("resize", fitCanvas);
        window.__fitCanvas = fitCanvas;

        // Watch for Phaser canvas creation and auto-fit
        (function observeCanvas() {
            var container = document.getElementById("phaser-canvas");
            if (!container) return;
            var obs = new MutationObserver(function (mutations) {
                for (var i = 0; i < mutations.length; i++) {
                    for (var j = 0; j < mutations[i].addedNodes.length; j++) {
                        if (mutations[i].addedNodes[j].tagName === "CANVAS") {
                            fitCanvas();
                            patchCanvasInputForRotation(mutations[i].addedNodes[j]);
                            obs.disconnect();
                            return;
                        }
                    }
                }
            });
            obs.observe(container, { childList: true });
        })();

        // -----------------------------------------------------------------------
        // Fix Phaser hit-testing when CSS rotation is active.
        // Phaser uses getBoundingClientRect() to map pointer coords to game
        // coords, but CSS rotation makes the bbox axis-aligned in viewport
        // space, breaking the mapping.  We override getBoundingClientRect on
        // the canvas to return virtual bounds that make Phaser's linear
        // mapping produce correct game coordinates, and swap clientX/clientY
        // on pointer events so the axes match the rotated layout.
        // -----------------------------------------------------------------------
        function patchCanvasInputForRotation(canvas) {
            var htmlStyle = window.getComputedStyle(document.documentElement);
            if (!htmlStyle.transform || htmlStyle.transform === "none") return;

            var origBCR = HTMLElement.prototype.getBoundingClientRect;

            // Override getBoundingClientRect to return the un-rotated bounds
            // Phaser expects.  We derive them from the real rotated rect by
            // swapping width/height and adjusting left/top.
            canvas.getBoundingClientRect = function () {
                var r = origBCR.call(canvas);
                // The CSS rotation is -90° so visual width↔height are swapped.
                // Return a virtual rect where width=r.height, height=r.width
                // and the origin is adjusted so Phaser's linear interpolation
                // maps correctly after our clientX↔clientY swap below.
                return {
                    left: r.top,
                    top: window.innerHeight - r.right,
                    right: r.bottom,
                    bottom: window.innerHeight - r.left,
                    width: r.height,
                    height: r.width,
                    x: r.top,
                    y: window.innerHeight - r.right,
                };
            };

            // Swap clientX/clientY on pointer events in the capture phase
            // so they align with the virtual getBoundingClientRect above.
            var vh = window.innerHeight;
            function swapCoords(e) {
                var cx = e.clientX;
                var cy = e.clientY;
                Object.defineProperty(e, "clientX", { value: cy });
                Object.defineProperty(e, "clientY", { value: vh - cx });
            }
            var evts = ["pointerdown", "pointerup", "pointermove",
                        "mousedown", "mouseup", "mousemove"];
            for (var i = 0; i < evts.length; i++) {
                canvas.addEventListener(evts[i], swapCoords, true);
            }
        }

        // Prevent back-navigation
        window.addEventListener("popstate", function () {
            history.pushState(null, "", location.href);
        });
        history.pushState(null, "", location.href);

        // -----------------------------------------------------------------------
        // iOS Safari "Add to Home Screen" prompt
        // -----------------------------------------------------------------------
        (function iosInstallPrompt() {
            if (typeof navigator === "undefined") return;
            var ua = navigator.userAgent;
            var isIOS = /iPad|iPhone|iPod/.test(ua)
                || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var isStandalone = window.navigator.standalone === true
                || window.matchMedia("(display-mode: standalone)").matches;
            if (!isIOS || isStandalone || window.cordova) return;
            try { if (localStorage.getItem("iosInstallDismissed")) return; } catch (e) {}
            setTimeout(function () {
                var banner = document.getElementById("iosInstallBanner");
                if (!banner) return;
                banner.style.display = "";
                var btn = document.getElementById("iosInstallDismiss");
                if (btn) {
                    btn.addEventListener("click", function () {
                        banner.style.display = "none";
                        try { localStorage.setItem("iosInstallDismissed", "1"); } catch (e) {}
                    }, false);
                }
                setTimeout(function () {
                    if (banner.style.display !== "none") banner.style.display = "none";
                }, 15000);
            }, 2000);
        })();
    </script>

    <!-- Boot the Phaser 4 game.
         For local dev (npx serve), the module script works fine.
         For Cordova builds, CI bundles src/phaser/boot-entry.js into
         lib/boot.bundle.js and replaces this block with a regular script. -->
    <script type="module">
        import { gameState } from "./src/gameState.js";
        import { initializeFirebaseScores } from "./src/firebaseScores.js";
        import { createPhaserGame } from "./src/phaser/PhaserGame.js";
        import { Ϫ } from "./src/constants.js";

        // -----------------------------------------------------------------
        // Auto-hide Phaser audio load errors on iOS TestFlight
        // -----------------------------------------------------------------
        (function hideAudioErrors() {
            function hideErrorElements() {
                var children = document.body.childNodes;
                for (var i = children.length - 1; i >= 0; i--) {
                    var node = children[i];
                    if (node.id === "baseUrl" || node.id === "phaser-canvas" ||
                        node.id === "iosInstallBanner" || node.id === "howtoModal" ||
                        node.tagName === "SCRIPT" || node.tagName === "LINK") {
                        continue;
                    }
                    var text = node.textContent || "";
                    if (text.indexOf("ERR:") !== -1) {
                        if (node.style) node.style.display = "none";
                        if (node.nodeType === 3) node.textContent = "";
                    }
                }
            }

            var timer = null;
            var observer = new MutationObserver(function () {
                if (timer) return;
                var bodyText = document.body.innerText || "";
                if (bodyText.indexOf("ERR:") !== -1) {
                    timer = setTimeout(function () {
                        hideErrorElements();
                        observer.disconnect();
                    }, Ϫ);
                }
            });

            observer.observe(document.body, { childList: true, subtree: true, characterData: true });
            setTimeout(function () { observer.disconnect(); }, 30000);
        })();

        // -----------------------------------------------------------------

        function waitFor(ms) {
            return new Promise(function (resolve) { setTimeout(resolve, ms); });
        }

        if (new URLSearchParams(window.location.search).get("lowmode") === "1") {
            gameState.lowModeFlg = true;
        }

        // Check for editor-repacked atlas files (Phaser-only, _ prefixed)
        function checkEditorAtlases() {
            var keys = ["game_ui", "game_asset", "title_ui"];
            var checks = keys.map(function (k) {
                return fetch("assets/_" + k + ".json", { method: "HEAD" })
                    .then(function (r) { return r.ok ? k : null; })
                    .catch(function () { return null; });
            });
            return Promise.all(checks).then(function (results) {
                var found = {};
                results.forEach(function (k) { if (k) found[k] = true; });
                window.__editorAtlases = found;
            });
        }

        Promise.race([
            initializeFirebaseScores().catch(function () {}),
            waitFor(1500),
        ]).then(function () {
            return checkEditorAtlases();
        }).then(function () {
            createPhaserGame();
            fitCanvas();
        });
    </script>
</body>
</html>
